*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
*::-webkit-scrollbar{display:none;}
html,body{width:100%;height:100%;overflow:hidden;background:#000;position:fixed;inset:0;}
canvas{position:fixed;inset:0;width:100%!important;height:100%!important;display:block;}

/* ── Tap hint ── */
#tapHint{
  position:fixed;bottom:52%;left:0;right:0;
  text-align:center;
  pointer-events:none;
  z-index:40;
  transition:opacity 1s ease;
}
#tapHint span{
  color:rgba(255,255,255,0.85);
  font-family:Georgia,serif;
  font-size:clamp(13px,3.5vw,20px);
  letter-spacing:5px;
  text-transform:uppercase;
  text-shadow:0 0 14px rgba(255,255,255,0.6);
  animation:tapBlink 1.2s ease-in-out infinite;
}
#tapHint.gone{opacity:0;}
@keyframes tapBlink{0%,100%{opacity:0.4;}50%{opacity:1;}}

/* ── Wish ── */
#wish{
  position:fixed;bottom:0;left:0;right:0;
  padding:24px 20px 48px;
  text-align:center;
  background:linear-gradient(to top,rgba(0,0,0,0.9) 55%,transparent);
  opacity:0;transform:translateY(16px);
  transition:opacity 2.8s ease,transform 2.8s ease;
  pointer-events:none;
}
#wish.show{opacity:1;transform:none;}
#wish h1{
  font-family:Georgia,serif;font-style:italic;font-weight:bold;
  font-size:clamp(30px,8vw,68px);letter-spacing:clamp(6px,2.5vw,18px);
  color:#fff;
  text-shadow:0 0 8px #fff,0 0 24px #ffdd44,0 0 50px #ffaa00,0 3px 6px rgba(0,0,0,0.95);
  margin-bottom:12px;animation:nameGlow 3s ease-in-out infinite;
}
@keyframes nameGlow{
  0%,100%{text-shadow:0 0 8px #fff,0 0 22px #ffdd44,0 0 45px #ffaa00,0 3px 6px rgba(0,0,0,0.95);}
  50%{text-shadow:0 0 14px #fff,0 0 38px #ffee66,0 0 80px #ffcc00,0 3px 6px rgba(0,0,0,0.95);}
}
#wish .sub{
  font-family:Georgia,serif;font-size:clamp(12px,3.5vw,19px);
  letter-spacing:clamp(3px,1.5vw,7px);text-transform:uppercase;
  color:#fff;font-weight:600;
  text-shadow:0 0 10px #ffcc44,0 2px 4px rgba(0,0,0,0.95);
  margin-bottom:8px;animation:subPulse 4s ease-in-out infinite;
}
@keyframes subPulse{0%,100%{opacity:.78;}50%{opacity:1;}}
#wish .dt{
  font-family:Georgia,serif;font-size:clamp(11px,2.8vw,15px);
  letter-spacing:clamp(5px,2vw,11px);color:#ffe07a;font-weight:500;
  text-shadow:0 0 8px #ffaa33,0 2px 4px rgba(0,0,0,0.9);
}

/* ── Hand btn ── */
#camBtn{
  position:fixed;top:16px;right:14px;z-index:30;
  width:42px;height:42px;border-radius:50%;
  background:rgba(50,15,110,0.65);
  border:1px solid rgba(180,120,255,0.35);
  backdrop-filter:blur(8px);font-size:20px;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:background 0.3s,border 0.3s;
}
#camBtn.on{background:rgba(10,70,10,0.65);border-color:rgba(60,220,60,0.4);}
#camBtn.fail{background:rgba(90,10,10,0.65);border-color:rgba(220,60,60,0.35);font-size:14px;}

/* ── Loader ── */
#loader{
  position:fixed;inset:0;z-index:50;background:#000;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;
  transition:opacity 1.2s ease;
}
#loader.gone{opacity:0;pointer-events:none;}
.orb{width:54px;height:54px;border-radius:50%;
  background:radial-gradient(circle at 35% 35%,#dd99ff,#5511bb,#060010);
  box-shadow:0 0 40px #9944ff;animation:orbPulse 2s ease-in-out infinite;}
@keyframes orbPulse{0%,100%{transform:scale(1);}50%{transform:scale(1.18);box-shadow:0 0 65px #cc77ff;}}
#loader p{color:rgba(200,170,255,0.7);font-family:Georgia,serif;font-size:13px;letter-spacing:5px;}

let _ac=null, _buf=null, _playing=false;
async function tryAudio(){
  if(_playing){if(_ac&&_ac.state==='suspended')_ac.resume();return;}
  _playing=true;
  try{
    _ac=new(window.AudioContext||window.webkitAudioContext)();
    await _ac.resume();
    const bin=atob(AUDIO_B64);
    const u8=new Uint8Array(bin.length);
    for(let i=0;i<bin.length;i++)u8[i]=bin.charCodeAt(i);
    _buf=await _ac.decodeAudioData(u8.buffer);
    const src=_ac.createBufferSource();
    src.buffer=_buf; src.loop=true;
    const gain=_ac.createGain();
    gain.gain.setValueAtTime(0,_ac.currentTime);
    gain.gain.linearRampToValueAtTime(0.7,_ac.currentTime+3);
    src.connect(gain); gain.connect(_ac.destination);
    src.start(0);
  }catch(e){_playing=false;console.warn('Audio:',e);}
}
document.addEventListener('visibilitychange',()=>{
  if(!document.hidden&&_ac&&_ac.state==='suspended')_ac.resume();
});
window.addEventListener('touchstart',tryAudio,{once:true,passive:true});
window.addEventListener('click',tryAudio,{once:true});

// ── Parse star data into typed arrays (fast iteration) ─────────────
const N   = STARS.length;
const TX  = new Float32Array(N), TY  = new Float32Array(N);
const CX  = new Float32Array(N), CY  = new Float32Array(N);
const SR  = new Float32Array(N), SAL = new Float32Array(N);
const STW = new Float32Array(N), STS = new Float32Array(N);
const SAR = new Float32Array(N);
const SC  = new Array(N);
for(let i=0;i<N;i++){
  const s=STARS[i];
  TX[i]=s[0]; TY[i]=s[1];
  CX[i]=s[2]; CY[i]=s[3];
  SR[i]=s[4]; SC[i]=s[5];
  SAL[i]=s[6]; STW[i]=s[7];
  STS[i]=s[8]; SAR[i]=s[9];
}

// ── Shooting stars ─────────────────────────────────────────────────────
let shooters=[];
function spawnShooter(){
  if(Math.random()<0.005&&shooters.length<3){
    const ang=0.25+Math.random()*0.55;
    shooters.push({
      x:Math.random()*W*0.75,y:Math.random()*H*0.18,
      vx:Math.cos(ang)*(10+Math.random()*7),
      vy:Math.sin(ang)*(10+Math.random()*7),
      life:1,tail:[],col:['#fff','#cce4ff','#ffe8cc'][0|Math.random()*3]
    });
  }
}
function drawShooters(){
  shooters=shooters.filter(s=>s.life>0);
  for(const s of shooters){
    s.tail.push({x:s.x,y:s.y});
    if(s.tail.length>14)s.tail.shift();
    s.x+=s.vx;s.y+=s.vy;s.life-=0.028;
    for(let i=1;i<s.tail.length;i++){
      const p=i/s.tail.length;
      ctx.globalAlpha=p*s.life*0.85;
      ctx.strokeStyle=s.col;ctx.lineWidth=1.2*p;
      ctx.beginPath();ctx.moveTo(s.tail[i-1].x,s.tail[i-1].y);ctx.lineTo(s.tail[i].x,s.tail[i].y);ctx.stroke();
    }
  }
  ctx.globalAlpha=1;
}

let hX=.5,hY=.5,hSX=.5,hSY=.5,hOn=false,camReady=false,detector=null,video=null;
let hParts=[];
function loadJS(url){
  return new Promise((res,rej)=>{
    const s=document.createElement('script');s.src=url;
    s.onload=res;s.onerror=()=>rej(new Error('Load failed:'+url));
    document.head.appendChild(s);
  });
}
async function startCam(){
  const btn=document.getElementById('camBtn');
  btn.textContent='⏳';btn.disabled=true;
  try{
    await loadJS('https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-core@4.10.0/dist/tf-core.min.js');
    await loadJS('https://cdn.jsdelivr.net/npm/@tensorflow/tfjs-backend-webgl@4.10.0/dist/tf-backend-webgl.min.js');
    await loadJS('https://cdn.jsdelivr.net/npm/@tensorflow-models/hand-pose-detection@2.0.1/dist/hand-pose-detection.min.js');
    await tf.setBackend('webgl');await tf.ready();
    video=document.createElement('video');video.setAttribute('playsinline','');video.muted=true;
    const stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'user',width:320,height:240},audio:false});
    video.srcObject=stream;await video.play();
    detector=await handPoseDetection.createDetector(
      handPoseDetection.SupportedModels.MediaPipeHands,
      {runtime:'tfjs',modelType:'lite',maxHands:1});
    camReady=true;btn.textContent='✋';btn.classList.add('on');btn.disabled=false;
    detectLoop();
  }catch(e){
    btn.textContent='✗';btn.classList.add('fail');btn.disabled=false;
    console.warn('Cam:',e.message);
  }
}
async function detectLoop(){
  if(!camReady||!detector)return;
  try{
    const hands=await detector.estimateHands(video,{flipHorizontal:true});
    if(hands&&hands.length){
      const k=hands[0].keypoints;
      hX=Math.max(0,Math.min(1,(k[0].x+k[9].x)*0.5/video.videoWidth));
      hY=Math.max(0,Math.min(1,(k[0].y+k[9].y)*0.5/video.videoHeight));
      hOn=true;
    }else hOn=false;
  }catch(e){hOn=false;}
  requestAnimationFrame(detectLoop);
}
document.getElementById('camBtn').addEventListener('click',()=>{tryAudio();if(!camReady)startCam();});

function drawHandFX(){
  if(!hOn)return;
  const hx=hSX*W,hy=hSY*H;
  for(let i=0;i<3;i++){
    const a=Math.random()*6.28,sp=0.8+Math.random()*3;
    hParts.push({x:hx,y:hy,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-0.8,life:1,r:0.6+Math.random()*2,col:SC[0|Math.random()*N]||'#cc88ff'});
  }
  if(hParts.length>160)hParts.splice(0,60);
  for(let ri=0;ri<3;ri++){
    const rp=(frame*0.04+ri*2.1)%(Math.PI*2);
    const rs=24+ri*18+Math.sin(rp)*5,ra=0.16*(0.5+0.5*Math.sin(rp));
    const g=ctx.createRadialGradient(hx,hy,0,hx,hy,rs);
    g.addColorStop(0,`rgba(200,140,255,${ra.toFixed(2)})`);
    g.addColorStop(0.6,`rgba(100,50,200,${(ra*0.3).toFixed(2)})`);
    g.addColorStop(1,'rgba(0,0,0,0)');
    ctx.beginPath();ctx.arc(hx,hy,rs,0,6.28);ctx.fillStyle=g;ctx.fill();
  }
  for(const p of hParts){
    p.x+=p.vx;p.y+=p.vy;p.vy+=0.04;p.life-=0.022;
    if(p.life<=0)continue;
    ctx.beginPath();ctx.arc(p.x,p.y,Math.max(0.3,p.r*p.life),0,6.28);
    ctx.fillStyle=p.col;ctx.globalAlpha=p.life*0.85;ctx.fill();
  }
  hParts=hParts.filter(p=>p.life>0);ctx.globalAlpha=1;
}

// ── Fullscreen ─────────────────────────────────────────────────────────
function goFS(){
  const e=document.documentElement;
  const r=e.requestFullscreen||e.webkitRequestFullscreen||e.mozRequestFullScreen||e.msRequestFullscreen;
  if(r)r.call(e).catch(()=>{});
}
document.addEventListener('touchstart',goFS,{once:true,passive:true});
document.addEventListener('click',goFS,{once:true});

// ── Helpers ────────────────────────────────────────────────────────────
const lerp=(a,b,t)=>a+(b-a)*t;
const clamp=(v,lo,hi)=>v<lo?lo:v>hi?hi:v;
const eo3=t=>1-(1-t)*(1-t)*(1-t);
const eio=t=>t<0.5?4*t*t*t:(t-1)*(2*t-2)*(2*t-2)+1;

// ── Timeline ───────────────────────────────────────────────────────────
const TL={NEBULA:120,RAIN:300,ASSEMBLE:480,DONE:900,WISH:990};

function faceLayout(f){
  let sc;
  if(f<TL.RAIN)     sc=0.05;
  else if(f<TL.ASSEMBLE) sc=0.05+0.13*eo3((f-TL.RAIN)/(TL.ASSEMBLE-TL.RAIN));
  else if(f<TL.DONE)     sc=0.18+0.76*eio((f-TL.ASSEMBLE)/(TL.DONE-TL.ASSEMBLE));
  else sc=0.94;
  const aspect=70/88,fH=H*sc,fW=fH*aspect;
  return{fW,fH,oX:(W-fW)*0.5,oY:(H-fH)*0.5};
}

// ── Click prompt ───────────────────────────────────────────────────────
// Tap hint — disappears immediately on first tap/click AND after 3s
const tapHint=document.getElementById('tapHint');
function hideTapHint(){tapHint.classList.add('gone');}
setTimeout(hideTapHint, 3000);
window.addEventListener('click',     hideTapHint, {once:true});
window.addEventListener('touchstart',hideTapHint, {once:true, passive:true});

// ── Main render ────────────────────────────────────────────────────────
let frame=0,wishDone=false;
setTimeout(()=>document.getElementById('loader').classList.add('gone'),500);

function tick(){
  requestAnimationFrame(tick);
  frame++;

  hSX=lerp(hSX,hOn?hX:0.5,hOn?0.09:0.03);
  hSY=lerp(hSY,hOn?hY:0.5,hOn?0.09:0.03);
  const hdx=(hSX-0.5)*0.15,hdy=(hSY-0.5)*0.12;

  ctx.fillStyle='#00000c';ctx.fillRect(0,0,W,H);

  const vg=ctx.createRadialGradient(W/2,H/2,H*0.05,W/2,H/2,Math.max(W,H)*0.78);
  vg.addColorStop(0,'rgba(0,0,0,0)');
  vg.addColorStop(0.6,'rgba(0,0,10,0.28)');
  vg.addColorStop(1,'rgba(0,0,5,0.9)');
  ctx.fillStyle=vg;ctx.fillRect(0,0,W,H);

  if(frame>TL.NEBULA){
    const np=clamp((frame-TL.NEBULA)/200,0,1);
    for(const n of NEBS){
      n.a=lerp(n.a,n.tgt*np,0.006);
      if(n.a<0.003)continue;
      const pulse=0.80+0.20*Math.sin(frame*0.006+n.p);
      ctx.save();
      ctx.translate(n.x*W+hdx*W*0.20,n.y*H+hdy*H*0.20);
      ctx.rotate(n.rot);ctx.scale(1,n.ry/n.rx);
      const rr=n.rx*Math.min(W,H)*0.85;
      const g=ctx.createRadialGradient(0,0,0,0,0,rr);
      const a1=(n.a*pulse*255|0).toString(16).padStart(2,'0');
      const a2=(n.a*pulse*0.22*255|0).toString(16).padStart(2,'0');
      g.addColorStop(0,n.col+a1);g.addColorStop(0.5,n.c2+a2);g.addColorStop(1,'#00000000');
      ctx.beginPath();ctx.arc(0,0,rr,0,6.28);ctx.fillStyle=g;ctx.fill();
      ctx.restore();
    }
  }

  for(const s of bgStars){
    const a=s.a*(0.45+0.55*Math.sin(frame*s.ts+s.tw));
    ctx.beginPath();ctx.arc(s.x+hdx*W*0.06,s.y+hdy*H*0.06,s.r,0,6.28);
    ctx.fillStyle=s.col;ctx.globalAlpha=a;ctx.fill();
  }
  ctx.globalAlpha=1;

  spawnShooter();drawShooters();

  if(frame>TL.RAIN){
    const fade=clamp((frame-TL.RAIN)/140,0,1);
    const{fW,fH,oX,oY}=faceLayout(frame);
    for(let i=0;i<N;i++){
      const startF=TL.ASSEMBLE+SAR[i]*(TL.DONE-TL.ASSEMBLE)*0.90;
      const arrP=clamp((frame-startF)/200,0,1);
      const ep=eo3(arrP);
      const tX=oX+TX[i]*fW+hdx*W*(1-ep*0.88);
      const tY=oY+TY[i]*fH+hdy*H*(1-ep*0.88);
      CX[i]=lerp(CX[i]*W,tX,0.044*ep+0.004)/W;
      CY[i]=lerp(CY[i]*H,tY,0.044*ep+0.004)/H;
      const cx=CX[i]*W,cy=CY[i]*H;
      const tw=Math.sin(frame*STS[i]+STW[i]);
      const vis=fade*SAL[i]*(0.60+0.40*tw);
      if(vis<0.012)continue;
      if(ep>0.04&&ep<0.88){
        ctx.beginPath();ctx.arc(cx,cy,SR[i]*5*(1-ep*0.70),0,6.28);
        ctx.fillStyle=SC[i]+'14';ctx.fill();
      }
      ctx.beginPath();ctx.arc(cx,cy,Math.max(0.7,SR[i]),0,6.28);
      ctx.fillStyle=SC[i];ctx.globalAlpha=Math.min(1,vis);ctx.fill();
    }
    ctx.globalAlpha=1;
    if(frame>TL.DONE){
      const fp=clamp((frame-TL.DONE)/90,0,1);
      ctx.lineWidth=0.5;
      for(let i=0;i<N;i+=10){
        if(SAL[i]<0.5)continue;
        const cx=CX[i]*W,cy=CY[i]*H;
        const tw=Math.sin(frame*STS[i]+STW[i]),len=SR[i]*4;
        ctx.strokeStyle=SC[i];ctx.globalAlpha=fp*(0.32+0.28*tw)*SAL[i];
        ctx.beginPath();ctx.moveTo(cx-len,cy);ctx.lineTo(cx+len,cy);
        ctx.moveTo(cx,cy-len);ctx.lineTo(cx,cy+len);ctx.stroke();
      }
      ctx.globalAlpha=1;
    }
  }

  drawHandFX();

  if(frame>TL.WISH&&!wishDone){
    wishDone=true;
    document.getElementById('wish').classList.add('show');
  }
}

tick();
</script>
